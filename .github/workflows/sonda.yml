name: Sonda de endpoints ML

on:
  workflow_dispatch:

jobs:
  sondar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Rodar sonda
        env:
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET: ${{ secrets.ML_APP_SECRET }}
        run: python sonda.py
