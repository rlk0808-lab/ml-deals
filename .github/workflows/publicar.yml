name: Publicador (fila espacada)

on:
  schedule:
    # 07h07 - 23h37 BRT = 10h07-23h37 UTC + 00h07-02h37 UTC (dia seguinte)
    # 34 disparos/dia. Nada roda 00h-07h BRT (madrugada).
    # minuto 7/37 (nao 0/30) de proposito - o GitHub documenta que ":00" e
    # ":30" sao os minutos mais congestionados nos runners compartilhados,
    # e atrasam/pulam mais. Deslocar pra um minuto "torto" evita isso.
    - cron: "7,37 10-23 * * *"
    - cron: "7,37 0-2 * * *"
  workflow_dispatch:
    inputs:
      testar_cartao_falso_desconto:
        description: "Enviar cartao de TESTE (dados ficticios) em vez de publicar da fila real"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1        # em sequencia, para nao conflitar no push
      matrix:
        nicho: [livros, bebes]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Publicar proximo item - ${{ matrix.nicho }}
        if: ${{ github.event.inputs.testar_cartao_falso_desconto != 'true' }}
        env:
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
        run: python -u publish_next.py ${{ matrix.nicho }}

      - name: Testar cartao de falso desconto - ${{ matrix.nicho }}
        if: ${{ github.event.inputs.testar_cartao_falso_desconto == 'true' }}
        env:
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
        run: python -u testar_cartao.py ${{ matrix.nicho }}

      - name: Salvar estado da fila
        run: |
          git config user.name  "publicador-bot"
          git config user.email "publicador-bot@users.noreply.github.com"
          git add data/
          git commit -m "publicar ${{ matrix.nicho }}: $(date -u +%Y-%m-%d\ %H:%M)" || echo "nada novo"
          git pull --rebase origin main
          git push
