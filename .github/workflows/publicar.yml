name: Publicador (fila espacada)

on:
  # O agendamento nao e mais feito pelo "schedule:" nativo do GitHub -
  # ele se mostrou pouco confiavel nesse repositorio (a maioria das 34
  # rodadas do dia simplesmente nao disparava). Um cron externo
  # (cron-job.org) chama a API de workflow_dispatch no horario certo,
  # 07h07-23h37 BRT a cada 30 min. Isso aqui so precisa aceitar o
  # disparo manual/externo.
  workflow_dispatch:
    inputs:
      testar_cartao_falso_desconto:
        description: "Enviar cartao de TESTE (dados ficticios) em vez de publicar da fila real"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false     # falha num nicho nao pode cancelar os outros
      max-parallel: 1        # em sequencia, para nao conflitar no push
      matrix:
        nicho: [livros, bebes, casa, moda]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Publicar proximo item - ${{ matrix.nicho }}
        if: ${{ github.event.inputs.testar_cartao_falso_desconto != 'true' }}
        env:
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
          TELEGRAM_CHAT_CASA:   ${{ secrets.TELEGRAM_CHAT_CASA }}
          TELEGRAM_CHAT_MODA:   ${{ secrets.TELEGRAM_CHAT_MODA }}
        run: |
          git config user.name  "publicador-bot"
          git config user.email "publicador-bot@users.noreply.github.com"

          # o coletor (a cada 3h) e o publicador (a cada 30min) agora rodam
          # de verdade e podem mexer no mesmo arquivo de fila quase ao mesmo
          # tempo. Se o push falhar, descarta o commit local (reset --hard
          # na origem) e roda TUDO de novo com dados frescos -
          # publish_next.py e idempotente (sempre opera em cima do que
          # estiver na fila NA HORA). Isso e diferente de so abortar o
          # rebase: abortar nao apaga o commit anterior, entao cada
          # tentativa ficava empilhando em cima da que falhou antes e
          # nunca resolvia o conflito de verdade.
          tentativas=3
          for i in $(seq 1 $tentativas); do
            echo "=== tentativa $i/$tentativas ==="
            git fetch origin main
            git reset --hard origin/main

            python -u publish_next.py ${{ matrix.nicho }}

            git add data/
            git commit -m "publicar ${{ matrix.nicho }}: $(date -u +%Y-%m-%d\ %H:%M)" || echo "nada novo"

            if git push origin main; then
              echo "=== publicado e salvo com sucesso ==="
              exit 0
            fi

            echo "=== push rejeitado (alguem chegou primeiro), tentando de novo com dados frescos ==="
            sleep $((i * 5))
          done

          echo "::error::Nao foi possivel salvar apos $tentativas tentativas"
          exit 1

      - name: Testar cartao de falso desconto - ${{ matrix.nicho }}
        if: ${{ github.event.inputs.testar_cartao_falso_desconto == 'true' }}
        env:
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
          TELEGRAM_CHAT_CASA:   ${{ secrets.TELEGRAM_CHAT_CASA }}
          TELEGRAM_CHAT_MODA:   ${{ secrets.TELEGRAM_CHAT_MODA }}
        run: python -u testar_cartao.py ${{ matrix.nicho }}
