name: Coletor de ofertas ML

on:
  schedule:
    # 4 rodadas/dia (UTC) -> 06h, 10h, 14h, 19h Brasilia
    - cron: "0 9,13,17,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1        # em sequencia, para nao conflitar no push
      matrix:
        nicho: [livros, bebes]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Coletar ${{ matrix.nicho }}
        env:
          ML_APP_ID:            ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET:        ${{ secrets.ML_APP_SECRET }}
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
        run: python collector.py ${{ matrix.nicho }}

      - name: Salvar historico
        run: |
          git config user.name  "coletor-bot"
          git config user.email "coletor-bot@users.noreply.github.com"
          git add data/
          # commita ANTES do pull (senao o rebase falha com mudancas soltas)
          git commit -m "${{ matrix.nicho }}: $(date -u +%Y-%m-%d\ %H:%M)" || echo "nada novo"
          git pull --rebase origin main
          git push
