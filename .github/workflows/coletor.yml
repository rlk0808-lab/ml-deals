name: Coletor de ofertas ML

on:
  # O agendamento nao e mais feito pelo "schedule:" nativo do GitHub -
  # ele se mostrou pouco confiavel nesse repositorio (rodadas pulando/
  # atrasando com frequencia, mesmo fora do horario cheio). Um cron
  # externo (cron-job.org) chama a API de workflow_dispatch no horario
  # certo. Isso aqui so precisa aceitar o disparo manual/externo.
  workflow_dispatch:
    inputs:
      forcar_camada2:
        description: "Forcar Camada 2 (melhor preco hoje) mesmo fora do horario"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false     # falha num nicho nao pode cancelar os outros
      max-parallel: 1        # em sequencia, para nao conflitar no push
      matrix:
        nicho: [livros, bebes, casa, moda]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Coletar ${{ matrix.nicho }}
        env:
          ML_APP_ID:            ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET:        ${{ secrets.ML_APP_SECRET }}
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
          TELEGRAM_CHAT_CASA:   ${{ secrets.TELEGRAM_CHAT_CASA }}
          TELEGRAM_CHAT_MODA:   ${{ secrets.TELEGRAM_CHAT_MODA }}
          FORCAR_CAMADA2:       ${{ (github.event_name == 'workflow_dispatch' && inputs.forcar_camada2) && '1' || '' }}
        run: |
          git config user.name  "coletor-bot"
          git config user.email "coletor-bot@users.noreply.github.com"

          # o coletor e o publicador agora rodam pontualmente e podem
          # mexer no mesmo arquivo de fila quase ao mesmo tempo. Se o
          # push falhar, descarta o commit local (reset --hard na origem)
          # e roda TUDO de novo com dados frescos - collector.py e seguro
          # de repetir (dedup por product_id). Isso e diferente de so
          # abortar o rebase: abortar nao apaga o commit anterior, entao
          # cada tentativa ficava empilhando em cima da que falhou antes
          # e nunca resolvia o conflito de verdade.
          tentativas=3
          for i in $(seq 1 $tentativas); do
            echo "=== tentativa $i/$tentativas ==="
            git fetch origin main
            git reset --hard origin/main

            python collector.py ${{ matrix.nicho }}

            git add data/
            git commit -m "${{ matrix.nicho }}: $(date -u +%Y-%m-%d\ %H:%M)" || echo "nada novo"

            if git push origin main; then
              echo "=== coletado e salvo com sucesso ==="
              exit 0
            fi

            echo "=== push rejeitado (alguem chegou primeiro), tentando de novo com dados frescos ==="
            sleep $((i * 5))
          done

          echo "::error::Nao foi possivel salvar apos $tentativas tentativas"
          exit 1
