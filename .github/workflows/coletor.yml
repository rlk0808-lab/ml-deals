name: Coletor de ofertas ML

on:
  schedule:
    # 8 rodadas/dia (UTC), a cada 3h -> 00h,03h,06h,09h,12h,15h,18h,21h Brasilia
    # minuto 7 (nao 0) de proposito - o GitHub documenta que ":00" e ":30"
    # sao os minutos mais congestionados nos runners compartilhados, e
    # atrasam/pulam mais. Deslocar pra um minuto "torto" evita isso.
    - cron: "7 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:
    inputs:
      forcar_camada2:
        description: "Forcar Camada 2 (melhor preco hoje) mesmo fora do horario"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1        # em sequencia, para nao conflitar no push
      matrix:
        nicho: [livros, bebes]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Coletar ${{ matrix.nicho }}
        env:
          ML_APP_ID:            ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET:        ${{ secrets.ML_APP_SECRET }}
          ML_AFFILIATE_TAG:     ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_LIVROS: ${{ secrets.TELEGRAM_CHAT_LIVROS }}
          TELEGRAM_CHAT_BEBES:  ${{ secrets.TELEGRAM_CHAT_BEBES }}
          FORCAR_CAMADA2:       ${{ (github.event_name == 'workflow_dispatch' && inputs.forcar_camada2) && '1' || '' }}
        run: python collector.py ${{ matrix.nicho }}

      - name: Salvar historico
        run: |
          git config user.name  "coletor-bot"
          git config user.email "coletor-bot@users.noreply.github.com"
          git add data/
          # commita ANTES do pull (senao o rebase falha com mudancas soltas)
          git commit -m "${{ matrix.nicho }}: $(date -u +%Y-%m-%d\ %H:%M)" || echo "nada novo"
          git pull --rebase origin main
          git push
