name: Coletor de precos ML

on:
  schedule:
    # 09:00 e 21:00 UTC = 06:00 e 18:00 em Brasilia
    - cron: "0 9,21 * * *"
  workflow_dispatch:        # permite rodar manualmente pelo botao

permissions:
  contents: write           # necessario para commitar o historico

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar coletor
        env:
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET: ${{ secrets.ML_APP_SECRET }}
          ML_AFFILIATE_TAG: ${{ secrets.ML_AFFILIATE_TAG }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python collector.py

      - name: Salvar historico no repositorio
        run: |
          git config user.name  "coletor-bot"
          git config user.email "coletor-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nada novo para commitar"
          else
            git commit -m "precos: $(date -u +%Y-%m-%d)"
            git push
          fi
